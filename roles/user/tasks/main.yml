- name: install git
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: yes
  tags: [install_git]

- name: add users
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: present
    create_home: yes
    shell: /bin/bash
  loop: '{{ users }}'
  tags: [create_users]

- name: add git branch to bash prompt
  ansible.builtin.blockinfile:
    path: "/home/{{ item.name }}/.bashrc"
    create: yes
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0644'
    marker: "# {mark} ANSIBLE MANAGED BLOCK: GIT PROMPT"
    block: |
      parse_git_branch() {
           git branch 2> /dev/null | sed -e '/^[^*]/d' -e 's/* \(.*\)/ (\1)/'
      }
      export PS1="${debian_chroot:+($debian_chroot)}\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\[\033[01;33m\]\$(parse_git_branch)\[\033[00m\]\$ "
  loop: "{{ users }}"
  tags: [prompt]

- name: Set git user name
  ansible.builtin.git_config:
    name: user.name
    value: "{{ item.name }}"
    scope: global 
  environment:
    HOME: "/home/{{ item.name }}"
  loop: "{{ users }}"
  tags: [git_config]

- name: Set git user email
  ansible.builtin.git_config:
    name: user.email
    value: "{{ item.email }}"
    scope: global
  environment:
    HOME: "/home/{{ item.name }}"
  loop: "{{ users }}"
  tags: [git_config]

- name: Ensure .ssh directory exists
  file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0700'
  loop: "{{ users }}"
  tags: [ssh] 

- name: Generate SSH key
  ansible.builtin.openssh_keypair:
    path: "/home/{{ item.name }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ item.email }}"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: '0600'
  when: not ansible_check_mode
  loop: "{{ users }}"
  tags: [ssh]

- name: Read public key
  ansible.builtin.slurp:
    src: "/home/{{ item.name }}/.ssh/id_ed25519.pub"
  register: ssh_keys
  when: not ansible_check_mode
  loop: "{{ users }}"
  tags: [ssh, github]

- name: Add SSH key to GitHub
  ansible.builtin.uri:
    url: "https://api.github.com/user/keys"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
      Accept: "application/vnd.github+json"
    body_format: json
    body:
      title: "{{ item.item.name }}@{{ inventory_hostname }}"
      key: "{{ item.content | b64decode }}"
  register: github_key_result
  failed_when: github_key_result.status not in [201, 422]
  loop: "{{ ssh_keys.results | selectattr('content', 'defined') | list }}"
  when: not ansible_check_mode
  tags: [github]

- name: Add github.com to known_hosts
  ansible.builtin.known_hosts:
    path: "/home/{{ item.name }}/.ssh/known_hosts"
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
  when: not ansible_check_mode
  loop: "{{ users }}"
  tags: [github]